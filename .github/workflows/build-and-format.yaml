name: Branch Build and Autoformat

run-name: Push to ${{ github.ref }} by @${{ github.actor }}

on:
  push:
    branches-ignore: [ $default-branch ]
  pull_request:
    branches: [ $default-branch ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: alpine:latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies (Alphine)
      run: |
        apk --no-cache --upgrade add \
          git \
          git-lfs \
          curl \
          jq \
          bash \
          build-base \
          python3 \
          valgrind \
          cppcheck \
          check-dev \
          lcov \
          alpine-sdk \
          pcre-dev \
          pcre2 \
          clang18-extra-tools && \
          ln -s /usr/lib/llvm18/bin/clang-format /usr/bin/clang-format 


    - name: Style check and auto-format
      run: |
        echo "Running style check..."
        if ! make style_check; then
          echo "Style issues found, attempting to auto-format..."
          make style_format
          echo "Re-running style check after formatting..."
          if ! make style_check; then
            echo "Style issues persist after formatting - likely cppcheck issues"
            exit 1
          fi
          echo "Auto-formatting successful, committing changes..."
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "action(style): auto-format code with clang-format [skip ci]"
          git push
        fi
        echo "Style check passed!"

    - name: Build library
      run: make s21_string.a

    - name: Run tests
      run: make test

    - name: Generate coverage report
      run: make gcov_report

    - name: Build release version
      run: make release

    - name: Clean build artifacts
      run: make clean

    - name: Verify clean state
      run: |
        if [ -d "./build/obj" ] || [ -d "./build/tests" ] || [ -f "../s21_string.a" ] || [ -f "../test" ]; then
          echo "Clean failed - build artifacts still present"
          exit 1
        fi
        echo "All targets completed successfully!" 
